name: Dalton Adoption Report

on:
  schedule:
    # 10am Lima (UTC-5) = 15:00 UTC — Lunes a Viernes
    - cron: "0 15 * * 1-5"
    # 4pm Lima (UTC-5) = 21:00 UTC — Lunes a Viernes
    - cron: "0 21 * * 1-5"
  workflow_dispatch: # permite correrlo manualmente desde GitHub

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run adoption script
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
        run: node adoption-script.js

      - name: Commit & push report
        run: |
          git config user.name "dalton-bot"
          git config user.email "dalton-bot@pacifico.com.pe"
          git add docs/report.json adoption-history.json
          git diff --cached --quiet || git commit -m "chore: adoption report $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
